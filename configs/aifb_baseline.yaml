project:
  name: xai26-strategy3-aifb-baseline
  seed: 42
  artifacts_dir: artifacts/aifb_baseline

dataset:
  name: aifb_baseline
  rdf_path: data/aifb/aifbfixed_complete.n3
  rdf_format: n3
  train_path: data/aifb/trainingSet.tsv
  test_path: data/aifb/testSet.tsv
  all_labels_path: data/aifb/completeDataset.tsv
  entity_column: person
  label_column: label_affiliation
  target_node_type: http://swrc.ontoware.org/ontology#Person
  label_names:
    http://www.aifb.uni-karlsruhe.de/Forschungsgruppen/viewForschungsgruppeOWL/id1instance: Business Information and Communication Systems
    http://www.aifb.uni-karlsruhe.de/Forschungsgruppen/viewForschungsgruppeOWL/id2instance: Efficient Algorithms
    http://www.aifb.uni-karlsruhe.de/Forschungsgruppen/viewForschungsgruppeOWL/id3instance: Knowledge Management
    http://www.aifb.uni-karlsruhe.de/Forschungsgruppen/viewForschungsgruppeOWL/id4instance: Complexity Management
    http://www.aifb.uni-karlsruhe.de/Forschungsgruppen/viewForschungsgruppeOWL/id5instance: Usability Engineering
  exclude_predicates:
    - http://swrc.ontoware.org/ontology#affiliation
    - http://swrc.ontoware.org/ontology#employs
  include_literal_nodes: false
  add_inverse_edges: true

model:
  name: rgcn
  initial_features: node_id
  embedding_dim: 64
  hidden_dim: 64
  dropout: 0.25
  epochs: 250
  learning_rate: 0.01
  weight_decay: 0.0005
  validation_fraction: 0.0
  early_stopping_patience: 0
  log_every: 25
  device: auto
  num_layers: 2
  use_residual: false
  use_layer_norm: false

explanation:
  learner: CELOE
  backend: ontolearn
  fallback_baseline: true
  target_classes: all
  example_source: predictions
  example_split: all
  max_positive_examples: 40
  max_negative_examples: 80
  random_seed: 42
  max_runtime_seconds: 60
  top_k: 3
  ontology_output: artifacts/aifb_baseline/aifb_without_labels.owl
  examples_output: artifacts/aifb_baseline/learning_problems.json
